name: docker-music-streaming

services:
  app:
    # Single image that carries the audio stack and its helper processes.
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: docker-music-streaming-app:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DOMAIN: ${DOMAIN}
      SECDOMAIN: ${SECDOMAIN}
      UPDATE_URL: ${UPDATE_URL}
      USE_SNAPCAST: ${USE_SNAPCAST}
      USE_MINIDLNA: ${USE_MINIDLNA}
      USE_AVAHI: ${USE_AVAHI}
      USE_HOST_AVAHI: ${USE_HOST_AVAHI}
      STREAM_OUT: ${STREAM_OUT}
      APP_STATE_ROOT: /var/lib/music-stack
      APP_RUNTIME_ROOT: /run/music-stack
    ports:
      # Native service ports are env-driven so they can be kept at defaults or
      # moved to fit the host environment without editing the compose file.
      - "${MPD_CONTROL_PORT:-6600}:6600"
      - "${MINIDLNA_PORT:-8200}:8200/tcp"
      - "${MINIDLNA_DISCOVERY_PORT:-1900}:1900/udp"
      - "${SNAPCAST_STREAM_PORT:-1704}:1704/tcp"
      - "${SNAPCAST_CONTROL_PORT:-1705}:1705/tcp"
      - "${SNAPWEB_PORT:-1780}:1780/tcp"
      - "${AVAHI_PUBLISHED_PORT:-5353}:5353/udp"
    volumes:
      # Music and config are managed from the host; state and runtime data live
      # in named volumes so container rebuilds do not reset the services.
      - type: bind
        source: ${MUSIC_DIRECTORY:-./music}
        target: /media/music
      - type: bind
        source: ./config
        target: /config
      # On Linux hosts, let containerized services talk to the host's Avahi
      # daemon over the real D-Bus and Avahi sockets instead of always running
      # a second Avahi daemon inside the container.
      - type: bind
        source: /var/run/dbus
        target: /var/run/dbus
      - type: bind
        source: /run/avahi-daemon/socket
        target: /run/avahi-daemon/socket
      - type: volume
        source: app_state
        target: /var/lib/music-stack
      - type: volume
        source: app_runtime
        target: /run/music-stack

  caddy:
    # Public web entrypoint for myMPD and the optional MPD HTTP stream.
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    env_file:
      - .env
    ports:
      # Default reverse-proxy mode uses the configured HTTP port. Direct HTTPS
      # mode reuses these mappings, typically as 80 and 443.
      - target: 80
        published: ${EXTERIOR_PORT:-80}
        protocol: tcp
      - target: 443
        published: ${EXTERIOR_PORT_HTTPS:-443}
        protocol: tcp
    volumes:
      - type: bind
        source: ./docker/caddy/start-caddy.sh
        target: /etc/caddy/start-caddy.sh
        read_only: true
      - type: volume
        source: caddy_data
        target: /data
      - type: volume
        source: caddy_config
        target: /config
    command:
      - /bin/sh
      - /etc/caddy/start-caddy.sh

volumes:
  # Persistent data volumes for service state and Caddy certificate/config data.
  app_state:
  app_runtime:
  caddy_data:
  caddy_config:
